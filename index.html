<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Roffa Offerte">
<meta name="theme-color" content="#2D5B8E">
<title>Roffa — Offerte Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #2D5B8E;
    --blue-dark: #1a3c5e;
    --blue-pale: #eef4fb;
    --border: #d8e4f0;
    --white: #ffffff;
    --cream: #f9f7f4;
    --text-muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .app-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(45,91,142,0.08);
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo { height: 40px; width: auto; }
  .header-divider { width: 1px; height: 26px; background: var(--border); }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--blue-dark);
    letter-spacing: 0.5px;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #16a34a;
    font-weight: 500;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #16a34a;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px;
    gap: 0;
  }
  .chat-frame-container {
    flex: 1;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(45,91,142,0.10);
    background: white;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .app-footer {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  @media (max-width: 600px) {
    .app-header { padding: 0 16px; }
    .chat-wrapper { padding: 12px; }
  }
</style>
</head>
